version: '3.8'

services:
  # ── Python AI Service (Tumor Detection Model) ──────────────────────
  ai-service:
    build:
      context: ./ai
      dockerfile: Dockerfile
    container_name: neuroguard-ai
    restart: unless-stopped
    environment:
      - TUMOR_CHECKPOINT_BRAIN=/app/checkpoints/brain_best_model.pth
      - TUMOR_CHECKPOINT_LIVER=/app/checkpoints/liver_best_model.pth
      - TUMOR_CHECKPOINT=/app/checkpoints/brain_best_model.pth
      - TUMOR_DEVICE=cpu
      - AI_PORT=8000
      - CORS_ORIGINS=*
    volumes:
      - ./ai/checkpoints:/app/checkpoints   # Mount your model checkpoint
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/tumor/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Node.js Backend (Express + MongoDB proxy) ──────────────────────
  backend:
    build:
      context: ./back-end
      dockerfile: Dockerfile
    container_name: neuroguard-backend
    restart: unless-stopped
    depends_on:
      - ai-service
    env_file:
      - ./back-end/.env
    environment:
      - AI_SERVICE_URL=http://ai-service:8000
    ports:
      - "5150:5150"
